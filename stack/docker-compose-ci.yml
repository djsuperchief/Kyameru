# Stack of terraform and localstack
services:
  localstack:
    container_name: "localstack-main"
    image: localstack/localstack
    ports:
      - "4566:4566" # LocalStack Gateway
      #- "127.0.0.1:4510-4559:4510-4559"  # external services port range
    environment:
      # LocalStack configuration: https://docs.localstack.cloud/references/configuration/
      #- DEBUG=${DEBUG:-0}
      - SERVICES=s3,sqs,sts,sns,ses,sesv2,dynamodb
      - DEFAULT_REGION=eu-west-2
      - DEBUG=0
      - EXTENSION_AUTO_INSTALL=localstack-extension-mailhog
      - DOCKER_SOCK=/run/podman/podman.sock
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}
    volumes:
      #- "/var/run/docker.sock:/var/run/docker.sock"
      - "./localstack-init.sh:/etc/localstack/init/ready.d/init-aws.sh" # ready hook
    healthcheck:
      test:
        [
          "CMD",
          "awslocal",
          "s3api",
          "wait",
          "bucket-exists",
          "--bucket",
          "tfstate"
        ]

  terraform:
    container_name: "terraform"
    build:
      context: .
      dockerfile: terraform.Dockerfile
    depends_on:
      localstack:
        condition: service_healthy
    volumes:
      - "./terraform:/terraform"
  
  web:
    image: nginx
    #volumes:
    #  - ./templates:/etc/nginx/templates
    volumes:
      - ./nginx/test.html:/usr/share/nginx/html/hello.html
    ports:
      - "3060:80"
    environment:
      #- NGINX_HOST=foobar.com
      - NGINX_PORT=80
